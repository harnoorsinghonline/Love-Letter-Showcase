kind = "web"
previewPath = "/"
title = "A Letter for Priya"
version = "1.0.0"
id = "artifacts/love-letter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18446

[services.development]
run = "pnpm --filter @workspace/love-letter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/love-letter", "run", "build" ]
publicDir = "artifacts/love-letter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18446"
BASE_PATH = "/"
